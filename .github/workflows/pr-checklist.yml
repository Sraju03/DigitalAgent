name: PR Checklist

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  checklist:
    runs-on: ubuntu-latest

    steps:
      - name: Add / Update PR checklist comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = `
## ✅ PR Checklist (Auto)

- [ ] Linked issue (Closes #...)
- [ ] Branch name follows convention (feat/*, fix/*, etc.)
- [ ] Code builds successfully
- [ ] Lint passes
- [ ] Tests added/updated
- [ ] No console logs / debug code
- [ ] Documentation updated (if needed)

> ⚠️ This checklist is auto-generated. Do not edit manually.
`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes("PR Checklist (Auto)"));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
