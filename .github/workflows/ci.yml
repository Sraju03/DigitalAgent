name: CI + PR Report

on:
  pull_request:
    types: [opened, synchronize, reopened]
    
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    outputs:
      branch_status: ${{ steps.branch.outputs.status }}
      lint_status: ${{ steps.lint.outputs.status }}
      build_status: ${{ steps.build.outputs.status }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - name: Validate branch name
        id: branch
        run: |
          if [[ ! "${{ github.head_ref }}" =~ ^(feat|fix|hotfix|ref)/ ]]; then
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Lint Check
        id: lint
        run: |
          if npm run lint; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Build Check
        id: build
        run: |
          if npm run build; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
          
  pr-comment:
    if: always() && github.event_name == 'pull_request'
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Add / Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const status = "${{ needs.validate.result }}";
                        
            const branch = "${{ needs.validate.outputs.branch_status }}";
            const lint = "${{ needs.validate.outputs.lint_status }}";
            const build = "${{ needs.validate.outputs.build_status }}";
            
            const recommendations = [];
            
            if (branch === "failed") {
              recommendations.push("🔹 Branch name must follow: `feat/*`, `fix/*`, `hotfix/*`, `ref/*`");
            }
            
            if (lint === "failed") {
              recommendations.push("🔹 Fix ESLint errors: run `npm run lint` locally before pushing");
            }
            
            if (build === "failed") {
              recommendations.push("🔹 Build failed: check TypeScript errors or missing dependencies");
            }
            
            if (recommendations.length === 0) {
              recommendations.push("🎉 Everything looks good! Ready to merge.");
            }
            
            const body = [
              `## 🚀 PR Validation Report - ${status === "success" ? "✅ Success" : "❌ Failed"}`,
              "",
              `🌿 Branch Naming: ${branch === 'success' ? "✅ Success" : "❌ Failed"}`,
              `🧹 Lint: ${lint === 'success' ? "✅ Success" : "❌ Failed"}`,
              `🏗️ Build: ${build === 'success' ? "✅ Success" : "❌ Failed"}`,
              "",
              "## 💡 Recommendations",
              "",
              ...recommendations,
              "",
              "---",
              "",
              "⚠️ Auto-generated report. Do not edit."
            ].join("\n");
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existing = comments.find(c =>
              c.body.includes("PR Validation Report")
            );
            
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
